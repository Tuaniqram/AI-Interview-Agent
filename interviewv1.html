<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AI Interview Agent - Live Chat</title>

<style>

* {
    margin:0;
    padding:0;
    box-sizing:border-box;
}


body {

    font-family:'Segoe UI',
    Tahoma,
    Geneva,
    Verdana,
    sans-serif;

    background:
    linear-gradient(
        135deg,
        #667eea 0%,
        #764ba2 100%
    );

    height:100vh;

    display:flex;

    justify-content:center;

    align-items:center;

    padding:20px;
}



.container {

    width:100%;

    max-width:900px;

    height:90vh;

    background:white;

    border-radius:12px;

    box-shadow:
    0 20px 60px rgba(0,0,0,.3);

    display:flex;

    flex-direction:column;

    overflow:hidden;

}



/* HEADER */

.header {

    background:
    linear-gradient(
        135deg,
        #667eea 0%,
        #764ba2 100%
    );

    color:white;

    padding:20px;

    text-align:center;

}


.header h1 {

    font-size:28px;

    margin-bottom:5px;

}


.header p {

    font-size:14px;

    opacity:.9;

}



/* SETUP */


.setup {

    padding:20px;

    background:#f8f9fa;

    border-bottom:
    1px solid #e0e0e0;

    display:flex;

    gap:10px;

    flex-wrap:wrap;

    align-items:center;

}



.setup input,
.setup select,
.setup button {


    padding:10px 15px;

    border:
    1px solid #ddd;

    border-radius:6px;

    font-size:14px;

}



.setup input,
.setup select {

    flex:1;

    min-width:160px;

    background:white;

}



.setup button {


    background:#667eea;

    color:white;

    border:none;

    cursor:pointer;

    font-weight:bold;

}



.setup button:hover {

    background:#764ba2;

}


.setup button:disabled {

    background:#ccc;

    cursor:not-allowed;

}






/* CHAT */


.chat-container {


    flex:1;

    overflow-y:auto;

    padding:20px;

    background:white;

}





.message {


    margin-bottom:16px;

    display:flex;

}

.message.interviewer {

    justify-content:flex-start;

}

.message.candidate {

    justify-content:flex-end;

}





.message-content {


    max-width:70%;

    padding:12px 16px;

    border-radius:12px;

    line-height:1.5;

}

.message.interviewer
.message-content {


    background:#e8e8ff;

    color:#333;

    border-left:
    4px solid #667eea;

}





.message.candidate
.message-content {


    background:#667eea;

    color:white;

    border-right:
    4px solid #764ba2;

}





.message.feedback
.message-content {


    background:#fff3cd;

    border-left:
    4px solid #ffc107;

    color:#333;

}





.message-label {


    font-size:12px;

    font-weight:bold;

    margin-bottom:4px;

}





/* INPUT */


.input-area {


    padding:20px;

    background:#f8f9fa;

    border-top:
    1px solid #e0e0e0;

    display:flex;

    gap:10px;

}



.input-area textarea {


    flex:1;

    padding:12px;

    border:
    1px solid #ddd;

    border-radius:6px;

    resize:none;

}



.input-area button {



    padding:12px 24px;

    background:#667eea;

    color:white;

    border:none;

    border-radius:6px;

    cursor:pointer;

    font-weight:bold;

}



.input-area button:disabled {

    background:#ccc;

}





/* MESSAGE TYPES */


.error {


    background:#fee;

    color:#c00;

    padding:12px;

    border-left:
    4px solid #c00;

    margin-bottom:10px;

}





.success {


    background:#efe;

    color:#060;

    padding:12px;

    border-left:
    4px solid #060;

    margin-bottom:10px;

}





.info {


    background:#eef;

    color:#006;

    padding:12px;

    border-left:
    4px solid #006;

    margin-bottom:10px;

}







.stats {


    background:#f8f9fa;

    padding:15px;

    border-top:
    1px solid #ddd;

    display:flex;

    justify-content:space-around;

}





.stat {

    text-align:center;

}


.stat-value {

    font-size:20px;

    font-weight:bold;

    color:#667eea;

}





.stat-label {

    font-size:12px;

    color:#666;

}





.spinner {


    width:12px;

    height:12px;


    border:
    2px solid #ddd;


    border-top-color:#667eea;


    border-radius:50%;


    animation:
    spin .6s linear infinite;

}


@keyframes spin {

    to {
        transform:rotate(360deg);
    }

}





.empty-state {

    text-align:center;

    color:#999;

    padding:40px;

}





/* PHASE INDICATOR STYLE */
.phase-indicator {
    padding:15px;
    background:#f8f9fa;
    border-top:1px solid #ddd;
    display:none;
}

.phase-indicator-content {
    text-align:center;
    color:#666;
    font-size:14px;
}

.phase-indicator strong {
    color:#667eea;
    font-weight:bold;
}

</style>

</head>


<body>


<div class="container">


<!-- HEADER -->

<div class="header">

<h1>

🎯 AI Interview Agent

</h1>

<p>

Company Based Technical Interview

</p>

</div>




<!-- SETUP -->



<div class="setup">


<select id="companySelect">

<option value="">

Loading companies...

</option>

</select>




<select id="jobRole">

<option value="">

Select Job Role...

</option>





<option>

Backend Developer

</option>

<option>

Frontend Engineer

</option>

<option>

DevOps Engineer

</option>

<option>

Data Scientist

</option>

<option>

Full Stack Developer

</option>

<option value="Petroleum Engineer">Petroleum Engineer</option>

</select>




<input

type="text"

id="apiUrl"

value="http://127.0.0.1:8000"

placeholder="API URL"

/>



<button

onclick="startInterview()"

id="startBtn">

Start Interview

</button>

<button

onclick="resetChat()"

id="resetBtn"

disabled>

Reset

</button>

</div>




<!-- CHAT -->

<div

class="chat-container"

id="chatContainer">



<div class="empty-state">



<p>

👋 Select company and role to begin

</p>



<p style="font-size:12px">

AI will interview based on company knowledge

</p>

</div>

</div>







<div

class="stats"

id="stats"

style="display:none">



<div class="stat">

<div

class="stat-value"

id="questionCount">

0

</div>

<div class="stat-label">

Questions

</div>

</div>



<div class="stat">

<div

class="stat-value"

id="avgScore">

-

</div>

<div class="stat-label">

Average Score

</div>

</div>



<div class="stat">

<div

class="stat-value"

id="turnCount">

0

</div>

<div class="stat-label">

Turns

</div>

</div>

</div>







<div class="phase-indicator" id="phaseIndicator">

<div class="phase-indicator-content">

📊 Phase: <strong id="currentPhaseText">undefined</strong>

| Difficulty: <strong id="difficultyText">Level 1</strong>

</div>

</div>







<div class="input-area">

<textarea

id="answerInput"

rows="2"

disabled

placeholder="Type your answer..."

></textarea>


<button

onclick="sendAnswer()"

id="sendBtn"

disabled>

Send

</button>

</div>

</div>

<script>

let state = {

    companyId: null,
    companyName: "",
    jobRole: "",
    apiUrl: "",
    currentQuestion: "",
    interviewStarted: false,
    scores: [],
    
    // NEW PHASE-BASED STATE
    sessionId: null,
    currentPhase: "intro",
    questionNumber: 0,
    difficultyLevel: 1,
    conversationHistory: [],
    turnCount: 0,
    totalQuestions: 10,
    interviewStatus: "idle"
};

function updatePhaseIndicator() {
    document.getElementById("phaseIndicator").style.display = "flex";
    document.getElementById("currentPhaseText").innerText = state.currentPhase;
    document.getElementById("difficultyText").innerText = `Level ${state.difficultyLevel}`;
}

function clearPhaseIndicator() {
    document.getElementById("phaseIndicator").style.display = "none";
}

const chatContainer =
    document.getElementById(
        "chatContainer"
    );

const answerInput =
    document.getElementById(
        "answerInput"
    );

const sendBtn =
    document.getElementById(
        "sendBtn"
    );

const startBtn =
    document.getElementById(
        "startBtn"
    );

const resetBtn =
    document.getElementById(
        "resetBtn"
    );

const stats =
    document.getElementById(
        "stats"
    );






// ================================

// LOAD COMPANY LIST

// ================================

async function loadCompanies(){


    const apiUrl =
        document.getElementById(
            "apiUrl"
        ).value;



    try{


        const response =
            await fetch(
                `${apiUrl}/companies/`
            );



        if(!response.ok){

            throw new Error(
                "Cannot fetch companies"
            );

        }



        const companies =
            await response.json();



        const select =
            document.getElementById(
                "companySelect"
            );



        select.innerHTML =
        `
        <option value="">
            Select Company...
        </option>
        `;


        companies.forEach(company => {



            const option =
                document.createElement(
                    "option"
                );



            option.value =
                company.id;


            option.textContent =
                company.name;


            select.appendChild(
                option
            );

        });


    }
    catch(error){


        console.error(
            "Company loading error:",
            error
        );


        showMessage(
            "❌ Failed loading companies",
            "error"
        );


    }


}




// ================================

// START INTERVIEW

// ================================

async function startInterview(){


    state.companyId =
        document.getElementById(
            "companySelect"
        ).value;


    state.companyName =
        document.getElementById(
            "companySelect"
        )
        .selectedOptions[0]
        ?.text;


    state.jobRole =
        document.getElementById(
            "jobRole"
        ).value;


    state.apiUrl =
        document.getElementById(
            "apiUrl"
        ).value;


    if(!state.companyId){


        showMessage(
            "Please select company",
            "error"
        );


        return;


    }


    if(!state.jobRole){


        showMessage(
            "Please select job role",
            "error"
        );


        return;


    }


    startBtn.disabled = true;

    answerInput.disabled = false;

    resetBtn.disabled = false;


    state.interviewStarted = true;

    state.scores = [];

    state.conversationHistory = [];

    state.turnCount = 0;

    state.currentPhase = "intro";
    state.questionNumber = 0;
    state.difficultyLevel = 1;


    chatContainer.innerHTML = "";

    stats.style.display = "flex";
    
    clearPhaseIndicator();

    showMessage(
        `🏢 Company: ${state.companyName}`,
        "info"
    );

    showMessage(
        `🎯 Role: ${state.jobRole}`,
        "info"
    );

    // CREATE SESSION FIRST
    await createSession();


}




// ================================

// CREATE SESSION

// ================================

async function createSession(){

    try{

        sendBtn.disabled = true;

        showTyping();

        const response =
            await fetch(
                `${state.apiUrl}/companies/${state.companyId}/interview/session`,
                {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        job_role: state.jobRole
                    })
                }
            );

        if(!response.ok){

            throw new Error(
                `API Error ${response.status}`
            );

        }

        const data = await response.json();


        removeTyping();


        if(data.error){


            showMessage(
                data.error,
                "error"
            );


            return;


        }


        // Store session data
        state.sessionId = data.session_id;
        state.currentPhase = data.current_phase;
        state.questionNumber = data.question_number;
        state.totalQuestions = data.total_questions;


        // Update phase indicator
        updatePhaseIndicator();

        // GET FIRST QUESTION
        await getNextQuestion();


    } catch(error) {


        removeTyping();


        console.error(error);


        showMessage(
            `❌ ${error.message}`,
            "error"
        );


        sendBtn.disabled = false;


    }


}




// ================================

// GET NEXT QUESTION

// ================================

async function getNextQuestion(){


    try{


        sendBtn.disabled = true;

        showTyping();




        // Build conversation history string
        const historyString = state.conversationHistory
            .map(entry => `Q: ${entry.question}\nA: ${entry.answer}`)
            .join("\n\n");


        const response =
            await fetch(
                `${state.apiUrl}/companies/${state.companyId}/interview/session/${state.sessionId}/next`,
                {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                   body: JSON.stringify({
                    job_role: state.jobRole,
                    conversation_history: historyString,
                    current_phase: state.currentPhase,
                    question_number: state.questionNumber,
                    difficulty_level: state.difficultyLevel,
                    previous_scores: state.scores
                })
                }
            );



        if(!response.ok){


            throw new Error(
                `API Error ${response.status}`
            );

        }

        const data =
            await response.json();


        removeTyping();


        if(data.error){


            showMessage(
                data.error,
                "error"
            );

            sendBtn.disabled = false;

            return;


        }


        // Update state
        state.currentQuestion = data.question;
        state.currentPhase = data.phase;
        state.questionNumber = data.question_number;
        state.difficultyLevel = data.difficulty_level;
        state.interviewStatus = data.interview_status;


        // Log conversation history
       


        // Display question
        addMessage(
            state.currentQuestion,
            "interviewer",
            "Interviewer"
        );


        // Check if interview has completed
        if(state.interviewStatus === "completed") {
            showMessage("🎉 Good job! Interview finished.", "success");
            sendBtn.disabled = true;
            return;
        }


        sendBtn.disabled = false;

        answerInput.focus();




    } catch(error) {


        removeTyping();

        console.error(error);

        showMessage(

            `❌ ${error.message}`,

            "error"

        );

        sendBtn.disabled = false;


    }


}





// ================================

// UI MESSAGE FUN




// ================================

function addMessage(

    text,

    type,

    label

){



    const messageDiv =

        document.createElement(

            "div"

        );

    messageDiv.className =

        `message ${type}`;


    const content =



        document.createElement(

            "div"

        );

    content.className =

        "message-content";

    content.innerText =

        text;

    const labelDiv =



        document.createElement(

            "div"

        );

    labelDiv.className =

        "message-label";

    labelDiv.innerText =

        label;


    messageDiv.appendChild(

        labelDiv

    );

    messageDiv.appendChild(

        content

    );

    chatContainer.appendChild(

        messageDiv

    );



    chatContainer.scrollTop =

        chatContainer.scrollHeight;



}





function showMessage(

    text,

    type

){



    const div =

        document.createElement(

            "div"

        );

    div.className =

        type;

    div.innerText =

        text;

    chatContainer.prepend(

        div

    );

}



function showTyping(){



    const div =

        document.createElement(

            "div"

        );

    div.id =

        "typing";

    div.className =

        "message interviewer";

    div.innerHTML =

    `

    <div class="message-content">

        <div class="spinner"></div>

        Interviewer is thinking...

    </div>

    `;

    chatContainer.appendChild(

        div

    );

}



function removeTyping(){



    const typing =

        document.getElementById(

            "typing"

        );

    if(typing){

        typing.remove();

    }

}





// Load companies when page opens

window.onload = function(){

    loadCompanies();

};

// ================================

// SEND ANSWER

// ================================

async function sendAnswer(){


    const answer =

        answerInput.value.trim();


    if(!answer){


        showMessage(

            "Please type your answer",

            "error"

        );

        return;


    }


    // Add candidate answer to conversation history
    state.conversationHistory.push({
        question: state.currentQuestion,
        answer: answer
    });


    addMessage(

        answer,

        "candidate",

        "You"

    );


    answerInput.value = "";


    state.turnCount++;

    updateStats();


    sendBtn.disabled = true;

    showTyping();


    try{


        const response =

            await fetch(

`${state.apiUrl}/companies/${state.companyId}/interview/answer`,

                {



                    method: "POST",

                    headers: {



                        "Content-Type": "application/json"

                    },

                    body: JSON.stringify({



                        job_role: state.jobRole,

                        session_id: state.sessionId,

                        question: state.currentQuestion,

                        candidate_answer: answer,

                        current_phase: state.currentPhase,

                        difficulty_level: state.difficultyLevel,

                        question_number: state.questionNumber,

                        conversation_history: state.conversationHistory
                            .map(entry => `Q: ${entry.question}\nA: ${entry.answer}`)
                            .join("\n\n")

                    })

                }

            );



        if(!response.ok){


            throw new Error(

                `API Error ${response.status}`

            );

        }

        const data = await response.json();
        console.log("=================");
        console.log(data);
        console.log("STATUS:", data.interview_status);
        console.log("=================");



        removeTyping();
       


        if(data.error){


            showMessage(

                data.error,

                "error"

            );

            sendBtn.disabled = false;

            return;


        }
        state.questionNumber = data.question_number;
        state.currentPhase = data.phase;
        state.difficultyLevel = data.difficulty_level;
        state.interviewStatus = data.interview_status;
        // Show evaluation
        if(data.evaluation){


            addMessage(



                data.evaluation,



                "feedback",



                "📋 Feedback"



            );

            // Extract score
            const scoreMatch =

                data.evaluation.match(

                    /Score[^0-9]*(\d+)/i

                );

            console.log(

                "Score:",

                scoreMatch

            );

            if(scoreMatch){



                state.scores.push(





                    parseInt(

                        scoreMatch[1]

                    )

                );

                updateStats();

            } else {



                state.scores.push(7);

                updateStats();

            }



        } else {



            // If no evaluation returned, add fallback score
            state.scores.push(7);
            updateStats();

        }

        // Check if interview has completed
        if(data.interview_status === "completed") {
            showMessage("🎉 Interview completed!", "success");
            sendBtn.disabled = true;
            return;
        }


        // Display next phase indicator
        updatePhaseIndicator();


        // Update next question
        console.log("NEXT QUESTION CALLED");
        await getNextQuestion();


    } catch(error){



        removeTyping();


        console.error(

            "Answer error:",

            error

        );


        showMessage(

            `❌ ${error.message}`,

            "error"

        );


        sendBtn.disabled = false;


    }


}





// ================================

// UPDATE STATISTICS

// ================================

function updateStats(){



    document.getElementById(

        "questionCount"

    )

    .innerText =

        state.questionNumber > 0 ? state.questionNumber : state.turnCount;



    document.getElementById(

        "turnCount"

    )

    .innerText =

        state.turnCount;


    if(state.scores.length > 0){



        const average =

        (



            state.scores.reduce(

                (a,b)=>a+b,

                0

            )

            /



            state.scores.length

        )

        .toFixed(1);




        document.getElementById(

            "avgScore"

        )

        .innerText =

            average;



    }


}





// ================================

// RESET CHAT

// ================================

function resetChat(){



    state = {





        companyId:null,





        companyName:"",





        jobRole:"",





        apiUrl:







        document.getElementById(







            "apiUrl"

        ).value,





        currentQuestion:"",





        interviewStarted:false,





        scores:[],
        
        // PHASE-BASED STATE
        sessionId: null,
        currentPhase: "intro",
        questionNumber: 0,
        difficultyLevel: 1,
        conversationHistory: [],
        turnCount: 0,
        totalQuestions: 10,
        interviewStatus: "idle"

    };



    chatContainer.innerHTML =

    `

    <div class="empty-state">

        <p>

        👋 Select company and role to begin

        </p>

    </div>

    `;


    answerInput.value = "";

    answerInput.disabled = true;

    sendBtn.disabled = true;

    startBtn.disabled = false;

    resetBtn.disabled = true;

    status.style.display = "none";
    clearPhaseIndicator();

}





// ================================

// ENTER TO SEND

// ================================

answerInput.addEventListener(

    "keypress",

    function(e){




        if(

            e.key === "Enter"

            &&

            !e.shiftKey

            &&

            !sendBtn.disabled

        ){




            e.preventDefault();




            sendAnswer();




        }


    }

);

    </script>
</body>
</html>
