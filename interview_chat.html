<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Interview Agent - Live Chat</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 900px;
            height: 90vh;
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            text-align: center;
            border-bottom: 3px solid rgba(255, 255, 255, 0.1);
        }

        .header h1 {
            font-size: 28px;
            margin-bottom: 5px;
        }

        .header p {
            font-size: 14px;
            opacity: 0.9;
        }

        .setup {
            padding: 20px;
            background: #f8f9fa;
            border-bottom: 1px solid #e0e0e0;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            align-items: center;
        }

        .setup input,
        .setup select,
        .setup button {
            padding: 10px 15px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 14px;
        }

        .setup input,
        .setup select {
            flex: 1;
            min-width: 150px;
            background: white;
        }

        .setup button {
            background: #667eea;
            color: white;
            border: none;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.3s;
        }

        .setup button:hover {
            background: #764ba2;
        }

        .setup button:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            background: white;
            scroll-behavior: smooth;
        }

        .message {
            margin-bottom: 16px;
            display: flex;
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.interviewer {
            justify-content: flex-start;
        }

        .message.candidate {
            justify-content: flex-end;
        }

        .message-content {
            max-width: 70%;
            padding: 12px 16px;
            border-radius: 12px;
            line-height: 1.5;
            word-wrap: break-word;
        }

        .message.interviewer .message-content {
            background: #e8e8ff;
            color: #333;
            border-left: 4px solid #667eea;
        }

        .message.candidate .message-content {
            background: #667eea;
            color: white;
            border-right: 4px solid #764ba2;
        }

        .message-label {
            font-size: 12px;
            font-weight: bold;
            margin-bottom: 4px;
            color: #666;
        }

        .message.candidate .message-label {
            text-align: right;
            color: #667eea;
        }

        .message.interviewer .message-label {
            color: #764ba2;
        }

        .message.feedback .message-content {
            background: #fff3cd;
            border-left: 4px solid #ffc107;
            color: #333;
        }

        .message.feedback .message-label {
            color: #ff9800;
        }

        .loading {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #999;
            font-size: 14px;
        }

        .spinner {
            display: inline-block;
            width: 12px;
            height: 12px;
            border: 2px solid #ddd;
            border-top-color: #667eea;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .input-area {
            padding: 20px;
            background: #f8f9fa;
            border-top: 1px solid #e0e0e0;
            display: flex;
            gap: 10px;
        }

        .input-area textarea {
            flex: 1;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-family: inherit;
            font-size: 14px;
            resize: none;
            max-height: 100px;
        }

        .input-area textarea:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .input-area button {
            padding: 12px 24px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.3s;
            white-space: nowrap;
        }

        .input-area button:hover:not(:disabled) {
            background: #764ba2;
        }

        .input-area button:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        .error {
            background: #fee;
            color: #c00;
            padding: 12px 16px;
            border-radius: 6px;
            margin-bottom: 10px;
            border-left: 4px solid #c00;
        }

        .success {
            background: #efe;
            color: #060;
            padding: 12px 16px;
            border-radius: 6px;
            margin-bottom: 10px;
            border-left: 4px solid #060;
        }

        .info {
            background: #eef;
            color: #006;
            padding: 12px 16px;
            border-radius: 6px;
            margin-bottom: 10px;
            border-left: 4px solid #006;
        }

        .score-badge {
            display: inline-block;
            background: #667eea;
            color: white;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
            margin: 8px 0;
        }

        .empty-state {
            text-align: center;
            color: #999;
            padding: 40px 20px;
        }

        .empty-state p {
            margin-bottom: 10px;
        }

        .stats {
            background: #f8f9fa;
            padding: 15px 20px;
            border-top: 1px solid #e0e0e0;
            display: flex;
            justify-content: space-around;
            flex-wrap: wrap;
            gap: 20px;
        }

        .stat {
            text-align: center;
        }

        .stat-value {
            font-size: 20px;
            font-weight: bold;
            color: #667eea;
        }

        .stat-label {
            font-size: 12px;
            color: #666;
            margin-top: 4px;
        }

        @media (max-width: 768px) {
            .setup {
                flex-direction: column;
            }

            .setup input,
            .setup select,
            .setup button {
                width: 100%;
            }

            .message-content {
                max-width: 90%;
            }

            .input-area {
                flex-direction: column;
            }

            .input-area button {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎯 AI Interview Agent</h1>
            <p>Real-time Conversational Technical Interview</p>
        </div>

        <div class="setup">
            <select id="jobRole">
                <option value="">Select Job Role...</option>
                <option value="Backend Developer">Backend Developer</option>
                <option value="Frontend Engineer">Frontend Engineer</option>
                <option value="DevOps Engineer">DevOps Engineer</option>
                <option value="Data Scientist">Data Scientist</option>
                <option value="Full Stack Developer">Full Stack Developer</option>
            </select>

            <input 
                type="text" 
                id="apiUrl" 
                placeholder="API URL (e.g., http://localhost:8000)" 
                value="http://localhost:8000"
            >

            <button onclick="startInterview()" id="startBtn">Start Interview</button>
            <button onclick="resetChat()" id="resetBtn" disabled>Reset</button>
        </div>

        <div class="chat-container" id="chatContainer">
            <div class="empty-state">
                <p>👋 Select a job role and click "Start Interview" to begin</p>
                <p style="font-size: 12px; color: #ccc;">You'll have a natural conversation with the AI interviewer</p>
            </div>
        </div>

        <div class="stats" id="stats" style="display: none;">
            <div class="stat">
                <div class="stat-value" id="questionCount">0</div>
                <div class="stat-label">Questions Asked</div>
            </div>
            <div class="stat">
                <div class="stat-value" id="avgScore">-</div>
                <div class="stat-label">Avg Score</div>
            </div>
            <div class="stat">
                <div class="stat-value" id="turnCount">0</div>
                <div class="stat-label">Turns</div>
            </div>
        </div>

        <div class="input-area">
            <textarea 
                id="answerInput" 
                placeholder="Type your answer here..."
                rows="2"
                disabled
            ></textarea>
            <button onclick="sendAnswer()" id="sendBtn" disabled>Send</button>
        </div>
    </div>

    <script>
        let state = {
            jobRole: '',
            apiUrl: '',
            messages: [],
            currentQuestion: '',
            interviewStarted: false,
            scores: [],
            turnCount: 0
        };

        const chatContainer = document.getElementById('chatContainer');
        const answerInput = document.getElementById('answerInput');
        const sendBtn = document.getElementById('sendBtn');
        const startBtn = document.getElementById('startBtn');
        const resetBtn = document.getElementById('resetBtn');
        const stats = document.getElementById('stats');

        async function startInterview() {
            state.jobRole = document.getElementById('jobRole').value;
            state.apiUrl = document.getElementById('apiUrl').value;

            if (!state.jobRole) {
                showMessage('Please select a job role', 'error');
                return;
            }

            if (!state.apiUrl) {
                showMessage('Please enter API URL', 'error');
                return;
            }

            startBtn.disabled = true;
            answerInput.disabled = false;
            resetBtn.disabled = false;
            state.interviewStarted = true;
            state.messages = [];
            state.scores = [];
            state.turnCount = 0;

            chatContainer.innerHTML = '';
            stats.style.display = 'flex';

            showMessage(`Starting interview for: ${state.jobRole}`, 'info');
            await getFirstQuestion();
        }

        async function getFirstQuestion() {
            try {
                sendBtn.disabled = true;
                showTyping();

                const response = await fetch(`${state.apiUrl}/interview`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        job_role: state.jobRole,
                        candidate_answer: ''
                    })
                });

                if (!response.ok) {
                    throw new Error(`API Error: ${response.status}`);
                }

                const data = await response.json();
                
                if (data.error) {
                    showMessage(`❌ ${data.error}`, 'error');
                    return;
                }

                state.currentQuestion = data.question;
                removeTyping();
                addMessage(data.question, 'interviewer', 'Interviewer');
                sendBtn.disabled = false;
                answerInput.focus();

            } catch (error) {
                removeTyping();
                showMessage(`❌ Connection Error: ${error.message}`, 'error');
                sendBtn.disabled = false;
            }
        }

        async function sendAnswer() {
            const answer = answerInput.value.trim();
            
            if (!answer) {
                showMessage('Please type an answer', 'error');
                return;
            }

            addMessage(answer, 'candidate', 'You');
            answerInput.value = '';
            state.turnCount++;
            updateStats();

            sendBtn.disabled = true;
            showTyping();

            try {
                const response = await fetch(`${state.apiUrl}/interview/evaluate-with-followup`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        job_role: state.jobRole,
                        question: state.currentQuestion,
                        candidate_answer: answer,
                        company_context: ''
                    })
                });

                if (!response.ok) {
                    throw new Error(`API Error: ${response.status}`);
                }

                const data = await response.json();

                if (data.error) {
                    removeTyping();
                    showMessage(`❌ ${data.error}`, 'error');
                    sendBtn.disabled = false;
                    return;
                }

                removeTyping();

                // Show evaluation
                if (data.evaluation) {
                    addMessage(data.evaluation, 'feedback', '📋 Feedback');
                    
                    // Extract score
                    const scoreMatch = data.evaluation.match(/Score:\s*(\d+)/);
                    if (scoreMatch) {
                        state.scores.push(parseInt(scoreMatch[1]));
                        updateStats();
                    }
                }

                // Show follow-up question
                if (data.suggested_follow_up) {
                    state.currentQuestion = data.suggested_follow_up;
                    addMessage(data.suggested_follow_up, 'interviewer', 'Interviewer');
                }

                sendBtn.disabled = false;
                answerInput.focus();

            } catch (error) {
                removeTyping();
                showMessage(`❌ Error: ${error.message}`, 'error');
                sendBtn.disabled = false;
            }
        }

        function addMessage(text, type, label) {
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${type}`;

            const labelDiv = document.createElement('div');
            labelDiv.className = 'message-label';
            labelDiv.textContent = label;

            const contentDiv = document.createElement('div');
            contentDiv.className = 'message-content';
            contentDiv.textContent = text;

            messageDiv.appendChild(labelDiv);
            messageDiv.appendChild(contentDiv);
            chatContainer.appendChild(messageDiv);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        function showMessage(text, type) {
            const msgDiv = document.createElement('div');
            msgDiv.className = type;
            msgDiv.textContent = text;
            chatContainer.insertBefore(msgDiv, chatContainer.firstChild);
        }

        function showTyping() {
            const typingDiv = document.createElement('div');
            typingDiv.id = 'typing';
            typingDiv.className = 'message interviewer';
            typingDiv.innerHTML = `
                <div style="display: flex; align-items: center; gap: 8px; padding: 12px 16px;">
                    <div class="spinner"></div>
                    <span style="color: #999;">Interviewer is thinking...</span>
                </div>
            `;
            chatContainer.appendChild(typingDiv);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        function removeTyping() {
            const typing = document.getElementById('typing');
            if (typing) typing.remove();
        }

        function resetChat() {
            state = {
                jobRole: '',
                apiUrl: '',
                messages: [],
                currentQuestion: '',
                interviewStarted: false,
                scores: [],
                turnCount: 0
            };

            chatContainer.innerHTML = '<div class="empty-state"><p>👋 Select a job role to start</p></div>';
            answerInput.value = '';
            answerInput.disabled = true;
            sendBtn.disabled = true;
            startBtn.disabled = false;
            resetBtn.disabled = true;
            stats.style.display = 'none';
        }

        function updateStats() {
            document.getElementById('questionCount').textContent = state.turnCount;
            document.getElementById('turnCount').textContent = state.turnCount;
            
            if (state.scores.length > 0) {
                const avg = (state.scores.reduce((a, b) => a + b, 0) / state.scores.length).toFixed(1);
                document.getElementById('avgScore').textContent = avg;
            }
        }

        // Allow sending with Enter key
        answerInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && !e.shiftKey && !sendBtn.disabled) {
                e.preventDefault();
                sendAnswer();
            }
        });
    </script>
</body>
</html>
